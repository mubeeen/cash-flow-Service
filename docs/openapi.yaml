openapi: 3.0.3
info:
  title: CashFlow Service API
  description: Enterprise-grade expense tracking API built with Node.js and TypeScript
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /api/v1/expenses:
    get:
      summary: List expenses
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 5, maximum: 100 }
      responses:
        '200':
          description: Paginated list of expenses
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Expense' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '429': { $ref: '#/components/responses/RateLimited' }

    post:
      summary: Create expense
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateExpenseInput' }
      responses:
        '201':
          description: Expense created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Expense' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/v1/expenses/{id}:
    get:
      summary: Get expense by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Single expense
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Expense' }
        '404': { $ref: '#/components/responses/NotFound' }

    patch:
      summary: Update expense
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateExpenseInput' }
      responses:
        '200':
          description: Expense updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Expense' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

    delete:
      summary: Delete expense
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Expense deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/categories:
    get:
      summary: List categories
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }

    post:
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 100 }
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/v1/auth/register:
    post:
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterInput' }
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '409':
          description: Email already registered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/v1/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 1 }
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/auth/logout:
    post:
      summary: Logout
      responses:
        '200':
          description: Logged out

  /api/health:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  timestamp: { type: string, format: date-time }

  /api/ready:
    get:
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready (DB connected)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  database: { type: string, example: connected }
                  timestamp: { type: string, format: date-time }
        '503':
          description: Service not ready (DB disconnected)

components:
  schemas:
    Expense:
      type: object
      properties:
        id: { type: string, format: uuid }
        item: { type: string }
        price: { type: number }
        date: { type: string, format: date-time }
        category: { $ref: '#/components/schemas/Category' }
        createdAt: { type: string, format: date-time }

    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        createdAt: { type: string, format: date-time }

    CreateExpenseInput:
      type: object
      required: [item, price, date, categoryId]
      properties:
        item: { type: string, minLength: 1, maxLength: 255 }
        price: { type: number, exclusiveMinimum: 0 }
        date: { type: string, format: date-time }
        categoryId: { type: string, format: uuid }

    UpdateExpenseInput:
      type: object
      properties:
        item: { type: string, minLength: 1, maxLength: 255 }
        price: { type: number, exclusiveMinimum: 0 }
        date: { type: string, format: date-time }
        categoryId: { type: string, format: uuid }

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message: { type: string }
            statusCode: { type: integer }

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    RateLimited:
      description: Too many requests
      headers:
        X-RateLimit-Limit: { schema: { type: integer } }
        X-RateLimit-Remaining: { schema: { type: integer } }
        Retry-After: { schema: { type: integer } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
